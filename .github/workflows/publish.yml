name: Publish
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  Publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm install

      - name: Set Version
        run: |
          echo ${GITHUB_SHA::8}
          sed -i 's/dev/dev '"${GITHUB_SHA::8}"'/' src/version.js
          sed -i 's|localhost|watskebart.github.io/espwebtool|' src/version.js

      - name: Build
        run: npm run build -- --base=/espwebtool/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
